<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#030f03"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Green border -->
  <rect x="2" y="2" width="60" height="60" rx="11" fill="none" stroke="#00ff00" stroke-width="1.5" opacity="0.5"/>
  <!-- wX lettering: w in green, X in bright green -->
  <text x="32" y="44" font-family="Arial Black,sans-serif" font-size="28" font-weight="900"
        fill="#00ff00" text-anchor="middle" filter="url(#glow)" letter-spacing="-1">wX</text>
</svg>
